name: Build & Deploy (repository_dispatch)

on:
  push:
    branches: ["main"]

  # Triggered by the CLI repo: dispatch event_type: "cli-docs-updated"
  repository_dispatch:
    types: [cli-docs-updated]

  # Optional: allow manual runs
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # vantage-cli is a private submodule whose .gitmodules URL is SSH.
      # Rewrite SSH→HTTPS+PAT before checkout so actions/checkout can
      # clone it without an SSH key on the runner.
      - name: Configure git to fetch private vantage-cli over HTTPS+PAT
        run: |
          git config --global url."https://x-access-token:${{ secrets.VANTAGE_CLI_RO_GITHUB_PAT }}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${{ secrets.VANTAGE_CLI_RO_GITHUB_PAT }}@github.com/".insteadOf "ssh://git@github.com/"

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.VANTAGE_CLI_RO_GITHUB_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install just
        run: sudo snap install just --classic

      - name: Build website
        env:
          GH_TOKEN: ${{ secrets.VANTAGE_CLI_RO_GITHUB_PAT }}
        run: just build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: [build]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
